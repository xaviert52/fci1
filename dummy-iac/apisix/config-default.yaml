deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  etcd:
    host:
      - http://etcd.pry.internal:2379
    prefix: /apisix

apisix:
  node_listen:
    - ip: 0.0.0.0
      port: 9080
  enable_ipv6: false

admin:
  enable_admin: true
  admin_listen:
    - ip: 127.0.0.1
      port: 9180
  admin_key_required: true
  admin_key:
    - name: admin
      key: sandbox-admin-key
      role: admin