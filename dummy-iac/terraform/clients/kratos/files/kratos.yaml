version: v1.2.0

log:
  level: info
  format: json

serve:
  public:
    base_url: https://front.primecore.online
    cors:
      enabled: true
      allowed_origins:
        - "*"
      allow_credentials: true
  admin:
    base_url: http://kratos:4434

identity:
  schemas:
    - id: default
      url: file:///etc/config/identity.schema.json

selfservice:
  default_browser_return_url: https://front.primecore.online/
  allowed_return_urls:
    - https://front.primecore.online

  methods:
    password:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true

  flows:
    registration:
      enabled: true
      ui_url: https://front.primecore.online/registro
      after:
        hooks:
          - hook: web_hook
            config:
              url: http://notifications:8080/events
              method: POST
              can_interrupt: false
              body: file:///etc/config/hooks/registration.jsonnet
              response:
                ignore: true

    verification:
      enabled: true
      use: code
      ui_url: https://front.primecore.online/verificacion
      after:
        hooks:
          - hook: web_hook
            config:
              url: http://notifications:8080/events
              method: POST
              can_interrupt: false
              body: file:///etc/config/hooks/verification.jsonnet
              response:
                ignore: true

    recovery:
      enabled: true
      use: code
      ui_url: https://front.primecore.online/recuperacion
      after:
        hooks:
          - hook: web_hook
            config:
              url: http://notifications:8080/events
              method: POST
              can_interrupt: false
              body: file:///etc/config/hooks/recovery.jsonnet
              response:
                ignore: true

    settings:
      ui_url: https://front.primecore.online/ajustes
      privileged_session_max_age: 15m
      after:
        hooks:
          - hook: web_hook
            config:
              url: http://notifications:8080/events
              method: POST
              can_interrupt: false
              body: file:///etc/config/hooks/settings.jsonnet
              response:
                ignore: true

    login:
      ui_url: https://front.primecore.online/login

hashers:
  argon2:
    parallelism: 1
    memory: "128MB"
    iterations: 2
    salt_length: 16
    key_length: 32

session:
  lifespan: 1h
  cookie:
    domain: primecore.online
    same_site: Lax

courier:
  smtp:
    connection_uri: smtp://localhost:1025/?skip_ssl_verify=true
    from_address: no-reply@primecore.online